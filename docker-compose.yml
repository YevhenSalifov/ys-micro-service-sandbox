networks:
  default:
    external: false
    ipam:
      driver: default
      config:
        - subnet: "172.16.238.0/24"


services:
  order.worker:
    container_name: order.worker
    build:
      context: .
      dockerfile: OrderService.Worker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker__Host=rabbitmq
      - CosmosDb__Endpoint=https://host.docker.internal:8081 # Звернення до Windows-хоста
      - CosmosDb__Key=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Порт для коду
      - "15672:15672" # Порт для браузера (Адмінка)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  cosmosdb:
    restart: always
    container_name: "azure-cosmos-emulator-latest"
    hostname: "azurecosmosemulator"
    image: "mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest"
    mem_limit: 4GB
    tty: true
    ports:
      - "8081:8081" # Data Explorer
      - "8900:8900"
      - "8901:8901"
      - "8902:8902"
      - "10250:10250"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
      - "10255:10255"
      - "10256:10256"
      - "10350:10350"
    expose:
      - "8081"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=11
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=172.16.238.246
    volumes:
      - cosmosdb-dog_adopter_console-data:/var/lib/cosmosdb
    networks:
      default:
        ipv4_address: 172.16.238.246

volumes:
  cosmosdb-dog_adopter_console-data: